name: Update Hockey Calendar

on:
  schedule:
    - cron: '0 19 * * 0'   # Sunday 20:00 Madrid time (UTC+1)
    - cron: '0 6 * * 3'    # Wednesday 07:00 Madrid time (UTC+1)
  workflow_dispatch:         # allows manual run from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated ICS
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hockey_calendar.ics
          git diff --cached --quiet || git commit -m "Update calendar $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Get current date
        id: date
        run: echo "date=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🏑 Hockey Calendar – ${{ steps.date.outputs.date }}"
          to: ${{ secrets.GMAIL_USER }}
          from: Hockey Calendar <${{ secrets.GMAIL_USER }}>
          body: file://changes.txt
